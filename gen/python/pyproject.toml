[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "platform-contracts"
version = "0.10.0"
description = "Generated Python bindings for platform contracts. Do not edit by hand — regenerate from schemas/."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]
license = { text = "UNLICENSED" }

[tool.setuptools.packages.find]
where = ["."]
include = ["platform_contracts*"]
