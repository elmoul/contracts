openapi: "3.1.0"
info:
  title: AI Gateway — Request / Response
  version: "0.1.0"
  description: >
    Unified AI call shape routed through ai-gateway (D022).
    Apps never call providers directly — all AI calls go through this contract.

paths:
  /ai/request:
    post:
      summary: Submit an AI request through the gateway
      operationId: submitAiRequest
      description: >
        The gateway performs a pre-flight authorization check with Treasury before
        forwarding to the provider. May transparently downshift the model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRequest"
      responses:
        "200":
          description: AI call completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiResponse"
        "402":
          description: Cost ceiling reached — request blocked by Treasury (D023)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedResponse"
        "503":
          description: Provider unavailable

components:
  schemas:
    AiRequest:
      type: object
      required:
        - prompt
        - appId
        - userId
      properties:
        prompt:
          type: string
          description: The prompt or message to send to the AI provider
          minLength: 1
        modelHint:
          type: string
          description: >
            Preferred model identifier. The gateway may downshift to a cheaper model
            if Treasury authorization requires it (D023).
          examples:
            - "claude-sonnet-4-6"
            - "gpt-4o"
        appId:
          type: string
          description: Functional app identifier for attribution and cost tracking
        userId:
          type: string
          description: End-user identifier within the app
        context:
          type: object
          description: >
            Provider-agnostic call context: system prompt, conversation history,
            temperature, max tokens, etc. Passed through by the gateway.
          additionalProperties: true
        media:
          type: array
          description: >
            Optional media attachments for multimodal requests (e.g. photo-based
            identification). Passed through by the gateway to providers that support
            vision input; ignored by text-only providers.
          items:
            type: object
            required:
              - data
              - mimeType
            properties:
              data:
                type: string
                format: byte
                description: Base64-encoded media content
              mimeType:
                type: string
                description: Media MIME type
                examples:
                  - "image/jpeg"
                  - "image/png"
            additionalProperties: false
      additionalProperties: false

    AiResponse:
      type: object
      description: >
        The outcome of an ai.request call. Normally a completed call: result/model/provider
        are present and tokensIn/tokensOut/computedCost reflect real usage. When `skipped` is
        true, the call was intentionally omitted — Treasury pre-flight returned DOWNSHIFT for a
        capability whose ai.model-manifest CapabilityDeclaration declares
        `downshiftPolicy: skip` — rather than completed, downshifted-and-called, or blocked:
        result/model/provider are absent, tokensIn/tokensOut/computedCost are 0, and no
        usage.event is emitted on the Kafka side (no work was actually metered). Still a 200
        response — `skipped` is the only new signal, no new status code.
      required:
        - tokensIn
        - tokensOut
        - computedCost
      properties:
        result:
          type: string
          description: The AI-generated response text. Absent when `skipped` is true.
        model:
          type: string
          description: >
            Actual model used — may differ from modelHint after downshift. Absent when
            `skipped` is true.
        provider:
          type: string
          description: AI provider that handled this request. Absent when `skipped` is true.
        tokensIn:
          type: integer
          minimum: 0
          description: Input tokens consumed. 0 when `skipped` is true.
        tokensOut:
          type: integer
          minimum: 0
          description: Output tokens produced. 0 when `skipped` is true.
        computedCost:
          type: number
          minimum: 0
          description: Cost in USD for this call, as computed by the gateway. 0 when `skipped` is true.
        skipped:
          type: boolean
          default: false
          description: >
            True when the gateway intentionally omitted the call (downshiftPolicy: skip on the
            requested capability — see ai.model-manifest). Absent or false means a normal
            completed call; existing consumers that never check this field see no behavior
            change.
      additionalProperties: false

    BlockedResponse:
      type: object
      required:
        - reason
      description: >
        Returned with HTTP 402 when Treasury blocks the request (D023).
        The reason field is always present — block state is never silent.
      properties:
        reason:
          type: string
          description: Human-readable explanation of why the request was blocked (e.g. monthly ceiling reached)
        ceiling:
          type: number
          minimum: 0
          description: Cost ceiling in USD for this app/user in the current period
        consumed:
          type: number
          minimum: 0
          description: Cost already consumed in the current period (USD)
      additionalProperties: false
