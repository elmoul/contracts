openapi: "3.1.0"
info:
  title: AI Gateway — Job Request / Status
  version: "0.1.0"
  description: >
    Async generation job envelope routed through ai-gateway to media-generation
    (D022 upheld, D047). Submission is a synchronous HTTP call — the gateway
    pre-flights at $0 (local GPU jobs, D047) then forwards to
    media-generation's VRAM-aware queue — but execution itself is
    asynchronous: poll GET /ai/jobs/{id} or follow the state-feed's
    job.progress events for progress.

paths:
  /ai/jobs:
    post:
      summary: Submit a generation job through the gateway
      operationId: submitAiJob
      description: >
        Forwarded to media-generation's queue after a $0 Treasury pre-flight.
        Returns as soon as the job is accepted onto the queue — it does not
        wait for the job to run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiJobRequest"
      responses:
        "202":
          description: Job accepted onto the queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiJobStatus"
        "402":
          description: Cost/resource ceiling reached — request blocked by Treasury (D023)
        "503":
          description: media-generation unavailable
  /ai/jobs/{id}:
    get:
      summary: Get the current status of a submitted job
      operationId: getAiJobStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiJobStatus"
        "404":
          description: No job with this id

components:
  schemas:
    AiJobRequest:
      type: object
      description: >
        Submitted by a caller (via ai-gateway) to request an async generation
        job from media-generation (D047). jobId is caller-generated so the
        caller can start polling/correlating before the 202 response returns.
      required:
        - jobId
        - appId
        - capability
        - input
        - params
        - jobClass
      properties:
        jobId:
          type: string
          format: uuid
          description: >
            Unique identifier for this job, generated by the caller. Used to
            poll GET /ai/jobs/{id} and to correlate job.progress state-events.
        appId:
          type: string
          description: >
            Functional app/caller identifier (D002) -- same shape as
            app.manifest's name / hexagon.descriptor's functionalName /
            ai.model-manifest's appId. Hub-side callers (design-studio,
            agent-runner) identify the same way, by functional name (D032) --
            no separate class taxonomy for non-app callers.
          pattern: "^[a-z][a-z0-9-]+$"
          examples:
            - "plantpal"
            - "design-studio"
        capability:
          type: string
          enum: ["text-to-image", "image-to-3d"]
          description: >
            The generation capability this job requests. Matches one of
            media-generation's registered CapabilityPort adapters. Video is a
            reserved capability slot (spec-media-generation.md §8) with no
            model/spec commitment yet, so it is deliberately not in this enum.
        input:
          type: object
          description: >
            Capability-dependent job input. `prompt` for text-to-image;
            `imageRef` for image-to-3d. Both declared optional at the schema
            level since which one is meaningful depends on `capability` --
            media-generation validates the combination for the requested
            capability, this schema does not cross-check it.
          properties:
            prompt:
              type: string
              minLength: 1
              description: Text prompt for a text-to-image job.
            imageRef:
              type: string
              description: >
                Reference (uploaded asset id or URL) to the source image for
                an image-to-3d job.
          additionalProperties: false
        params:
          type: object
          description: >
            Capability-specific parameters, passed through by the gateway
            (e.g. resolution/max_num_view for image-to-3d; steps/aspect ratio
            for text-to-image). Deliberately permissive at this level, same
            idiom as connector.invoke.request's params -- media-generation's
            capability adapter validates against its own declared param
            schema.
          additionalProperties: true
        jobClass:
          type: string
          enum: ["interactive", "batch"]
          description: >
            interactive runs as soon as VRAM admits; batch holds for the
            configured night window (conventions rule). Owner can force-run
            any queued job regardless of class.
      additionalProperties: false

    AiJobStatus:
      type: object
      description: >
        Current state of a submitted job. Returned both by the submit call's
        202 response (initial state, normally "queued") and by
        GET /ai/jobs/{id} (subsequent polls).
      required:
        - jobId
        - status
        - submittedAt
      properties:
        jobId:
          type: string
          format: uuid
          description: Echoes the jobId from the originating AiJobRequest.
        status:
          type: string
          enum: ["queued", "admitted", "loading", "running", "succeeded", "failed", "cancelled"]
          description: >
            Current lifecycle status of the job (media-generation's
            queue/admission/model-lifecycle states).
        progressPct:
          type: number
          minimum: 0
          maximum: 100
          description: >
            Best-effort completion percentage while running. Absent when not
            meaningful (e.g. still queued).
        resultRefs:
          type: array
          description: >
            References to the job's output artifacts (GET /jobs/{id}/artifacts/*
            paths on media-generation) once succeeded. Absent or empty until
            results exist.
          items:
            type: string
        error:
          $ref: "#/components/schemas/JobError"
        usage:
          $ref: "#/components/schemas/JobUsage"
        submittedAt:
          type: string
          format: date-time
          description: When the job was accepted onto the queue.
        startedAt:
          type: string
          format: date-time
          description: When the job left the queue and began running (admitted/loading/running).
        finishedAt:
          type: string
          format: date-time
          description: When the job reached a terminal status (succeeded/failed/cancelled).
      additionalProperties: false
      if:
        properties:
          status:
            const: failed
      then:
        required:
          - error

    JobError:
      type: object
      description: Present when status is "failed"; absent otherwise.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable failure code (e.g. "vram-exhausted", "worker-unavailable").
        message:
          type: string
          description: Human-readable failure detail.
      additionalProperties: false

    JobUsage:
      type: object
      description: >
        Best-effort resource usage, populated as it becomes known (may be
        partially populated on a job that failed mid-run).
      properties:
        durationMs:
          type: integer
          minimum: 0
          description: Wall-clock run duration in milliseconds.
        vramPeakMb:
          type: integer
          minimum: 0
          description: Peak VRAM usage observed during the job, in megabytes.
      additionalProperties: false
