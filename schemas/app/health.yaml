openapi: "3.1.0"
info:
  title: App — Health
  version: "0.1.0"
  description: >
    Health response shape conforming to Spring Actuator format (app.health contract, D009).
    Apps using Spring Boot expose this at /actuator/health with zero mapping.
    Non-Spring apps must conform to this same shape at /health.

paths:
  /health:
    get:
      summary: App health check endpoint
      operationId: getHealth
      responses:
        "200":
          description: App is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppHealth"
        "503":
          description: App is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppHealth"

components:
  schemas:
    AppHealth:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
          description: >
            Aggregate health status.
            UP: all components healthy.
            DOWN: one or more critical components failed.
            OUT_OF_SERVICE: deliberately taken offline.
            UNKNOWN: status cannot be determined.
        components:
          type: object
          description: Per-component health breakdown (Spring Actuator populates this automatically)
          additionalProperties:
            $ref: "#/components/schemas/HealthComponent"
      additionalProperties: false

    HealthComponent:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
        details:
          type: object
          description: Component-specific diagnostic details
          additionalProperties: true
      additionalProperties: false
