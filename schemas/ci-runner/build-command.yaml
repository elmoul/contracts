$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://platform/contracts/ci-runner/build-command"
title: BuildCommand
description: >
  Command sent by control-plane to ci-runner requesting that a repo be built
  at a specific git ref. ci-runner responds with HTTP 202 (acknowledged) and
  later reports the outcome asynchronously via BuildResult.
type: object
required: [correlationId, repo, ref]
additionalProperties: false
properties:
  correlationId:
    type: string
    description: >
      Opaque token generated by the caller (control-plane). Echoed in the
      matching BuildResult so the caller can correlate the async response.
  repo:
    type: string
    description: "Full GitHub repository name — owner/repo, e.g. elmoul/plant-pal"
    pattern: "^[\\w.-]+/[\\w.-]+$"
  ref:
    type: string
    description: "Git ref to build: branch name, tag, or full SHA"
  workflow:
    type: string
    description: >
      Workflow file name (e.g. ci.yml) or numeric workflow ID.
      Defaults to the repo's primary workflow when omitted.
