$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://platform/contracts/ci-runner/build-result"
title: BuildResult
description: >
  Async result reported by ci-runner to control-plane after a workflow run
  completes. Sent via HTTP POST to the control-plane build-result port once
  the GitHub webhook delivers the final `workflow_job` event.
type: object
required: [correlationId, repo, ref, runId, status, completedAt]
additionalProperties: false
properties:
  correlationId:
    type: string
    description: Echoed from the original BuildCommand.
  repo:
    type: string
    description: Full GitHub repository name (owner/repo).
  ref:
    type: string
    description: Git ref that was built.
  runId:
    type: integer
    format: int64
    existingJavaType: java.lang.Long
    description: GitHub Actions workflow run ID.
  status:
    type: string
    enum: [success, failure, cancelled, timed_out]
    description: Terminal outcome of the build.
  artifactRef:
    type: string
    description: >
      GHCR image reference (e.g. ghcr.io/elmoul/plant-pal:sha-abc1234) if the
      workflow pushed an image. Absent when no image was produced.
  completedAt:
    type: string
    format: date-time
    description: ISO-8601 timestamp of build completion (from GitHub webhook).
