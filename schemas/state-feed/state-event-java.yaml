openapi: "3.1.0"
info:
  title: State-feed — Event Schemas (Java codegen wrapper)
  version: "0.1.0"
  description: >
    OpenAPI wrapper around the state.event JSON Schema, used only to drive
    openapi-generator for the Java binding (jsonschema2pojo cannot generate
    per-variant classes from a oneOf union). The source of truth for all
    other consumers (TypeScript, Python, validators) is state.event.json.

paths: {}

components:
  schemas:
    ComponentHealthEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["component.health"]
          description: Discriminator value — always "component.health"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/ComponentHealthPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    ComponentHealthPayload:
      type: object
      required:
        - componentId
        - status
      properties:
        componentId:
          type: string
          description: Functional identifier of the hexagon or infrastructure component
        status:
          type: string
          enum: ["UP", "DOWN", "DEGRADED"]
          description: Current health status
        details:
          type: string
          description: Optional human-readable detail about a non-UP status
      additionalProperties: false

    LoadEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["load"]
          description: Discriminator value — always "load"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/LoadPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    LoadPayload:
      type: object
      required:
        - componentId
        - value
      properties:
        componentId:
          type: string
          description: Functional identifier of the component being measured
        value:
          type: number
          minimum: 0
          maximum: 100
          description: Load percentage (0–100)
        metric:
          type: string
          description: What is being measured (cpu, memory, rps, etc.)
      additionalProperties: false

    CostTickEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["cost.tick"]
          description: Discriminator value — always "cost.tick"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/CostTickPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    CostTickPayload:
      type: object
      required:
        - period
        - totalCost
      properties:
        period:
          type: string
          description: Billing period in YYYY-MM format
          pattern: "^\\d{4}-\\d{2}$"
        totalCost:
          type: number
          minimum: 0
          description: Total platform AI cost in USD for the period so far
        breakdown:
          type: object
          description: Cost in USD keyed by appId or provider
          additionalProperties:
            type: number
            minimum: 0
      additionalProperties: false

    CiRunEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["ci.run"]
          description: Discriminator value — always "ci.run"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/CiRunPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    CiRunPayload:
      type: object
      description: Produced by ci-runner for each workflow_job phase transition.
      required:
        - runId
        - repo
        - ref
        - workflow
        - jobName
        - phase
        - runnerLabels
      properties:
        runId:
          type: integer
          format: int64
          description: GitHub Actions workflow run ID.
        repo:
          type: string
          description: Full repo name (owner/repo).
        ref:
          type: string
          description: Branch or tag that triggered the run.
        workflow:
          type: string
          description: Workflow name as reported by GitHub.
        jobName:
          type: string
          description: Specific job name within the workflow.
        phase:
          type: string
          enum: ["queued", "in_progress", "completed"]
          description: Lifecycle phase matching the GitHub workflow_job action.
        conclusion:
          type: string
          enum: ["success", "failure", "cancelled", "skipped", "timed_out"]
          description: Terminal outcome; present only when phase=completed.
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        runnerLabels:
          type: array
          items:
            type: string
          description: Labels on the runner that executed the job.
      additionalProperties: false

    AppStatusEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["app.status"]
          description: Discriminator value — always "app.status"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/AppStatusPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    AppStatusPayload:
      type: object
      required:
        - appId
        - status
      properties:
        appId:
          type: string
          description: Functional app identifier as assigned by the control plane
        status:
          type: string
          enum: ["starting", "running", "degraded", "stopped"]
          description: Current runtime status of the app
        version:
          type: string
          description: Deployed version (semver)
      additionalProperties: false

    ActivityCountEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["activity.count"]
          description: Discriminator value — always "activity.count"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/ActivityCountPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    ActivityCountPayload:
      type: object
      required:
        - componentId
        - activity
        - count
      properties:
        componentId:
          type: string
          description: Functional identifier of the emitting component
        activity:
          type: string
          description: Machine-readable name of what is being counted
        count:
          type: integer
          minimum: 0
          description: >-
            Count of this activity SINCE THE LAST emission for this
            (componentId, activity) pair — a delta, not a cumulative total.
            Consumers aggregate across emissions.
      additionalProperties: false

    JobProgressEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["job.progress"]
          description: Discriminator value — always "job.progress"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/JobProgressPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    JobProgressPayload:
      type: object
      description: Emitted by media-generation for each job lifecycle transition (D047).
      required:
        - jobId
        - capability
        - status
        - queueDepth
      properties:
        jobId:
          type: string
          format: uuid
          description: Matches the jobId from the originating ai.job.request.
        capability:
          type: string
          enum: ["text-to-image", "image-to-3d"]
          description: The generation capability this job requests, same enum as ai.job.request's capability.
        status:
          type: string
          enum: ["queued", "admitted", "loading", "running", "succeeded", "failed", "cancelled"]
          description: Current lifecycle status, same enum as ai.job.status's status.
        queueDepth:
          type: integer
          minimum: 0
          description: Number of jobs queued (including this one) at emission time.
        progressPct:
          type: number
          minimum: 0
          maximum: 100
          description: Best-effort completion percentage while running. Absent when not meaningful (e.g. still queued).
        vramFreeMb:
          type: integer
          minimum: 0
          description: Free VRAM in megabytes at emission time (admission headroom; the overflow tell).
      additionalProperties: false

    AgentRunEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["agent.run"]
          description: Discriminator value — always "agent.run"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/AgentRunPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    AgentRunPayload:
      type: object
      description: Emitted by agent-runner for each dispatched Claude Code session's lifecycle transition (D048).
      required:
        - runId
        - repo
        - phase
      properties:
        runId:
          type: string
          format: uuid
          description: Unique identifier for this run, from agent-runner's own ledger.
        repo:
          type: string
          description: Functional name (D002) of the repo the session ran in.
          pattern: "^[a-z][a-z0-9-]+$"
        demandId:
          type: string
          description: >-
            The id of the demand this session was dispatched to fulfill (same
            shape as demand.id / demand.fulfillment's demandId). Absent for
            owner-commissioned sessions not tied to a specific demand.
          pattern: "^[a-z][a-z0-9-]+-\\d{8}-[a-z0-9-]+$"
        phase:
          type: string
          enum: ["launched", "finished", "failed", "stopped"]
          description: Lifecycle phase of the dispatched session.
        durationMs:
          type: integer
          minimum: 0
          description: Wall-clock session duration in milliseconds. Present on finished/failed/stopped, absent on launched.
        tokensUsed:
          type: integer
          minimum: 0
          description: Total tokens consumed by the session so far, parsed from Claude Code's JSON output.
      additionalProperties: false

    DesignMissionEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["design.mission"]
          description: Discriminator value — always "design.mission"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/DesignMissionPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    DesignMissionPayload:
      type: object
      description: Emitted by design-studio for each mission stage/gate transition (D051).
      required:
        - missionId
        - targetRepo
        - regime
        - stage
      properties:
        missionId:
          type: string
          format: uuid
          description: Unique identifier for this mission, from design-studio's own ledger.
        targetRepo:
          type: string
          description: Functional name (D002) of the hexagon this mission designs for.
          pattern: "^[a-z][a-z0-9-]+$"
        regime:
          type: string
          enum: ["console-class", "inhabited-class"]
          description: >-
            Which design regime/checklist this mission is gated by (D053):
            D036 information-first console law, or the Inhabited Interface
            doctrine.
        stage:
          type: string
          enum: ["harvest", "interview", "brief", "theme-gate", "coverage-gate", "plan-gate", "executing", "feel-gate", "closed"]
          description: Current stage of the mission state machine.
        gateOutcome:
          type: string
          enum: ["approved", "rejected"]
          description: Owner's recorded decision, present when this event reports a gate outcome.
      additionalProperties: false

    DesignSystemEvent:
      type: object
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          enum: ["design.designSystem"]
          description: Discriminator value — always "design.designSystem"
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the event was produced
        payload:
          $ref: "#/components/schemas/DesignSystemPayload"
        origin:
          $ref: "#/components/schemas/Origin"
      additionalProperties: false

    DesignSystemPayload:
      type: object
      description: Emitted by design-studio for each DesignSystem registry lifecycle transition (S-B1).
      required:
        - designSystemId
        - name
        - slug
        - version
        - regime
        - status
        - origin
        - change
      properties:
        designSystemId:
          type: string
          format: uuid
          description: Unique identifier for this design system, from design-studio's registry.
        name:
          type: string
          description: Human-readable name of the design system.
        slug:
          type: string
          description: Functional identifier (D002) for the design system.
          pattern: "^[a-z][a-z0-9-]+$"
        version:
          type: string
          description: Design system version (semver, optionally v-prefixed).
          pattern: "^v?\\d+\\.\\d+\\.\\d+$"
        regime:
          type: string
          enum: ["console-class", "inhabited-class"]
          description: >-
            Which design regime/checklist this design system is gated by
            (D053): D036 information-first console law, or the Inhabited
            Interface doctrine.
        status:
          type: string
          enum: ["draft", "validated", "retired"]
          description: Current lifecycle status of the design system.
        origin:
          type: string
          enum: ["owner-built", "mission-built"]
          description: How this design system came to exist — hand-built by the owner, or produced end-to-end by a design mission.
        sourceMissionId:
          type: string
          format: uuid
          description: The design mission that produced this design system. Absent/null when origin is owner-built.
        change:
          type: string
          enum: ["created", "validated", "retired", "release"]
          description: The reason this particular event fired.
      additionalProperties: false

    Origin:
      type: string
      enum: ["host", "hub"]
      description: >-
        Which wall the event was produced on (D011). Optional — absent means
        host, preserving compatibility with producers that predate this field.
